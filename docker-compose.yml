services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./.env.example
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/storage:/app/storage

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @dashforge/web dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
    depends_on:
      - api

